spring.application.name=cart-service
server.port=8085

# 서비스마다 자기만의 DB를 갖는다 (Database per Service)
spring.datasource.url=jdbc:h2:mem:cartdb;DB_CLOSE_DELAY=-1
spring.h2.console.enabled=true

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# cart 는 상품 검증을 위해 product-service 를 HTTP 로 호출한다 (자기 소유의 ProductPort 구현)
# 하드코딩된 주소 대신 Eureka 에 등록된 논리 이름으로 호출한다 (@LoadBalanced 가 실제 주소로 치환)
cart.client.product-base-url=http://product-service
