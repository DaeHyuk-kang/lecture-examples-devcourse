spring:
  application:
    name: gateway-server
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - AddResponseHeader=X-Passed-Through, gateway-server
          # 라우트는 위에서부터 검사한다 — 구체적인 경로가 먼저!
          routes:
            - id: order-route
              uri: lb://order-service
              predicates:
                - Path=/orders/**

            - id: product-route
              uri: lb://product-service
              predicates:
                - Path=/products/**

            - id: payment-route
              uri: lb://payment-service
              predicates:
                - Path=/payments/**

            - id: seller-route
              uri: lb://seller-service
              predicates:
                - Path=/sellers/**

            - id: settlement-route
              uri: lb://settlement-service
              predicates:
                - Path=/settlements/**

            - id: cart-route            # /users/** 보다 구체적이므로 반드시 user-route 위에
              uri: lb://cart-service
              predicates:
                - Path=/users/*/cart/**

            - id: user-route
              uri: lb://user-service
              predicates:
                - Path=/users/**
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

server:
  port: 8000

management:
  endpoint:            # (단수)
    gateway:
      access: read-only
  endpoints:           # (복수)
    web:
      exposure:
        include: gateway
