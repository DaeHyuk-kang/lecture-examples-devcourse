spring.application.name=order-service
server.port=8080

# 서비스마다 자기만의 DB를 갖는다 (Database per Service)
spring.datasource.url=jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1
spring.h2.console.enabled=true

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 이 두 줄이 "base-url만 바꾸면 MSA"의 실체.
# 배포 환경에서는 http://product-service.internal 같은 주소로만 바꾸면 된다.
order.client.product-base-url=http://localhost:8081
order.client.payment-base-url=http://localhost:8082
