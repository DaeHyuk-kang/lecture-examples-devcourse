spring.application.name=settlement-service
server.port=8086

# 서비스마다 자기만의 DB를 갖는다 (Database per Service)
# 정산은 주문 read-model(orders/payments)과 정산 결과(settlements)를 자기 DB에 둔다.
spring.datasource.url=jdbc:h2:mem:settlementdb;DB_CLOSE_DELAY=-1
spring.h2.console.enabled=true

spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# SQL 바인딩 파라미터까지 로그로 출력
logging.level.org.hibernate.orm.jdbc.bind=trace

# --- Spring Batch ---
# 부팅 시 등록된 Job 자동 실행 끄기 (정산 Job 은 컨트롤러에서 수동 실행)
spring.batch.job.enabled=false
# H2 에 배치 메타데이터 테이블(BATCH_JOB_*, BATCH_STEP_*) 자동 생성
spring.batch.jdbc.initialize-schema=always
# 정산 Job 의 chunk 크기 (= Reader pageSize)
settlement.batch.chunk-size=1000

# --- [Step4] 병렬 처리 (멀티스레드 / 파티셔닝) ---
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=3000
settlement.batch.thread-count=8
settlement.batch.grid-size=8

# --- 대용량 시드 데이터 (정산 배치 실습용) ---
# true 로 켜면 부팅 시 이 서비스의 orders/payments 테이블에 대량 데이터를 적재한다.
#   ./gradlew :settlement-service:bootRun --args='--settlement.seed.enabled=true --settlement.seed.count=1000000 --spring.jpa.show-sql=false'
settlement.seed.enabled=false
settlement.seed.count=1000000
settlement.seed.batch-size=10000
